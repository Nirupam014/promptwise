name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dev tooling
        run: npm install --no-save eslint @eslint/js globals prettier eslint-config-prettier
      - name: ESLint
        run: npx eslint .
      - name: Prettier (check)
        run: npx prettier --check .
