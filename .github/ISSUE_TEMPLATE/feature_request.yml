name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: surface
    attributes:
      label: Which surface would this affect?
      multiple: true
      options:
        - core (engine)
        - cli
        - browser-extension
        - vscode-extension
        - new surface / adapter
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
